{% extends "base.html" %}

{% block title %}المنتجات | {{ store_name }}{% endblock %}

{% block content %}
<section class="page-section page-top">
    <p class="eyebrow">كل المنتجات</p>
    <h1>اختر القطعة المناسبة لستايلك.</h1>

    <form class="filters" method="get">
        <label>
            التصنيف
            <select name="category">
                <option value="الكل">الكل</option>
                {% for category in categories %}
                    <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            المقاس
            <select name="size">
                <option value="الكل">الكل</option>
                {% for size in sizes %}
                    <option value="{{ size }}" {% if selected_size == size %}selected{% endif %}>{{ size }}</option>
                {% endfor %}
            </select>
        </label>
        <button type="submit">تطبيق الفلتر</button>
    </form>

    <div class="product-grid">
        {% for product in products %}
            {% include "partials/product_card.html" %}
        {% else %}
            <p class="empty-state">لا توجد منتجات مطابقة لهذا الفلتر.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
